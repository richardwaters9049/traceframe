services:
  web:
    build:
      context: ./apps/web
      target: development
    command:
      - sh
      - -c
      - bun install --frozen-lockfile && bun run dev --hostname 0.0.0.0
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/.next

volumes:
  web_node_modules:
  web_next_cache:
