name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"
          cache: pip
      - name: Install web dependencies
        working-directory: apps/web
        run: bun install --frozen-lockfile
      - name: Lint and test web
        working-directory: apps/web
        run: bun run lint && bun test && bun run build
      - name: Audit web dependencies
        working-directory: apps/web
        run: bun audit --production
      - name: Install worker dependencies
        run: python -m pip install -r services/worker/requirements.txt -r services/worker/requirements-dev.txt pip-audit==2.9.0
      - name: Lint and test worker
        run: python -m ruff check services/worker/src services/worker/tests && python -m pytest -q services/worker/tests && python -m compileall -q services/worker/src
      - name: Audit Python dependencies
        run: python -m pip_audit -r services/worker/requirements.txt
      - name: Build Render production images
        run: |
          docker build --file deploy/render/web.Dockerfile --tag traceframe-render-web:ci .
          docker build --file deploy/render/worker.Dockerfile --tag traceframe-render-worker:ci .
          docker build --file deploy/render/minio.Dockerfile --tag traceframe-render-minio:ci .
      - name: Install browser
        working-directory: apps/web
        run: bunx playwright install --with-deps chromium firefox webkit
      - name: Start integration stack
        run: cp .env.example .env && docker compose up -d --build --wait
      - name: Run browser and accessibility checks
        working-directory: apps/web
        run: bun run test:e2e
      - name: Capture integration logs
        if: failure()
        run: docker compose logs --no-color > compose.log
      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: traceframe-ci-diagnostics-${{ github.run_id }}
          path: |
            compose.log
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
          retention-days: 7
      - name: Stop integration stack
        if: always()
        run: docker compose down --volumes --remove-orphans
